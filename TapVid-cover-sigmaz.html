<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TapVid — Anything to Motion Video</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<style>
  :root{
    --tappy-green:#8FD71B;
    --ink:#0A0A0A;
    --paper:#FFFFFF;
    --signal-purple:#5B4FFF;
    --mist-green:#F0FAE0;
    --mist-purple:#EFEEFF;
    --gray-700:#404040;
    --gray-500:#737373;
    --gray-300:#D4D4D4;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#0a0a0a;overflow:hidden;
    font-family:'Inter','PingFang SC','Noto Sans SC',sans-serif;}

  /* 9:16 stage, scaled to fit viewport */
  #cover{
    position:fixed;left:50%;top:50%;
    width:1080px;height:1920px;
    transform-origin:center center;
    background:linear-gradient(180deg,var(--mist-green) 0%,var(--mist-purple) 100%);
    overflow:hidden;
  }
  #stage{position:absolute;inset:0;z-index:1;}
  .overlay{position:absolute;inset:0;z-index:2;pointer-events:none;
    display:flex;flex-direction:column;align-items:center;}

  /* --- top: logo + chip --- */
  .top{margin-top:120px;display:flex;flex-direction:column;align-items:center;}
  .top svg{width:400px;height:auto;display:block;}

  /* --- hero copy --- */
  .hero{margin-top:104px;text-align:center;}
  .hero h1{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;
    font-size:118px;line-height:1.02;letter-spacing:-2px;color:var(--ink);}
  .hero .tagline{margin-top:44px;font-family:'Inter',sans-serif;
    font-weight:500;font-size:36px;letter-spacing:.3px;color:var(--gray-700);}

  /* --- bottom: CTA --- */
  .bottom{position:absolute;left:0;right:0;bottom:160px;
    display:flex;flex-direction:column;align-items:center;gap:34px;}
  .cta{position:relative;text-decoration:none;
    display:inline-flex;align-items:center;gap:20px;
    background:var(--ink);
    font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:42px;
    padding:32px 64px;border-radius:999px;
    box-shadow:0 18px 50px rgba(10,10,10,.22);
    pointer-events:auto;cursor:pointer;
    transition:transform .28s cubic-bezier(.2,.8,.2,1),box-shadow .28s ease;
    animation:ctaGlow 3.4s ease-in-out infinite;}
  .cta .arr{width:40px;height:40px;position:relative;z-index:2;
    transition:transform .28s cubic-bezier(.2,.8,.2,1);}

  /* ShinyText (React Bits) — vanilla port.
     props: color #b5b5b5, shineColor #fff, speed 2s, spread 120deg, direction left.
     The component animates backgroundPosition 150% -> -50% on a 200% gradient;
     CSS keyframes reproduce it identically (shine off-screen at both ends -> seamless loop). */
  .cta-txt{display:inline-block;position:relative;z-index:2;
    background-image:linear-gradient(120deg,
      #b5b5b5 0%, #b5b5b5 35%, #ffffff 50%, #b5b5b5 65%, #b5b5b5 100%);
    background-size:200% auto;
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
    animation:shinyText 2s linear infinite;}
  /* pauseOnHover={false} by default; flip to running->paused here to enable it */

  /* 微交互: 悬停上浮 + 箭头位移, 按下回弹 */
  .cta:hover{transform:translateY(-5px) scale(1.035);
    box-shadow:0 28px 64px rgba(10,10,10,.32);}
  .cta:hover .arr{transform:translateX(8px);}
  .cta:active{transform:translateY(-1px) scale(.99);
    box-shadow:0 14px 38px rgba(10,10,10,.26);}

  @keyframes shinyText{from{background-position:150% center;}to{background-position:-50% center;}}
  @keyframes ctaGlow{0%,100%{box-shadow:0 18px 50px rgba(10,10,10,.22);}
    50%{box-shadow:0 20px 56px rgba(10,10,10,.30);}}
</style>
</head>

<script>
/* ============================================================================
   ANIMATION MODULE  —  THIS is the part you redesign per concept.
   Everything below up to "LOOP CLOCK (keep)" defines the SUBJECT: its colors,
   geometry (buildGrass), how it grows/sways (draw loop), and its letter-bloom.
   Default subject = a field of wheat made of the word "tapvid".
   To make a different subject (tree / wave / fireworks / bars / skyline...):
   reshape buildGrass() + the per-element draw + the bloom, but REUSE the loop
   clock, wind, ripen, and bloom helpers. See references/technique.md §8.
   Always render fine detail as LETTERS (JetBrains Mono) to stay on-brand.
   ============================================================================ */

/* --- SUBJECT: SigmaZ-style intelligence orb, assembled out of letters ---
   A glowing sphere of glyphs floats inside a dark "porthole" capsule. The
   letters converge from a cloud into a sphere (grow), ripen from cool violet
   into TapVid green (ripen), then sparkle/glow at full strength (bloom). Two
   faint letter-streams reach in from the corners — the human hand and the
   robot hand of the reference, redrawn as information flowing into the orb. */

/* color journey: 墨黑 → 蓝 → 绿 (cool — emerges from the dark, ignites blue, ripens green) */
const COL_INK_A    = '#101a3a';   // deep ink-blue, assemble phase (emerges from dark)
const COL_INK_B    = '#26345f';
const COL_BLUE_A   = '#4F5BFF';   // Tappy Blue, mid phase (ignites)
const COL_BLUE_B   = '#6ea0ff';
const RIPE_GREEN_A = '#8FD71B';   // Tappy Green, ripe phase
const RIPE_GREEN_B = '#a8e84f';
const RIPE_ICE     = '#9fd0ff';   // cool highlight accent
const RIPE_WHITE   = '#eef0ff';   // white sparkle
const SIGNAL       = '#5B4FFF';

const CW = 1080, CH = 1920;

/* --- the capsule / porthole --- */
const ORB_CX = 540, ORB_CY = 1150;   // focal center, in the middle band
const DISC_R = 322;                  // dark porthole radius
const ORB_R  = 206;                  // sphere radius (letters live on this)

/* --- the letter-sphere --- */
const ORB_FONT      = "JetBrains Mono";   // 品牌 ASCII / 代码字体
const ORB_CHARS     = "tapvid</>{}01=+";
const ORB_COUNT     = 300;                // glyphs on the sphere
const ORB_BASE_SIZE = 25;
const GOLDEN_ANGLE  = 2.39996323;
const ROT_SPEED     = 0.00022;            // slow self-rotation
const STAR_COUNT    = 80;                 // faint starfield inside the disc

/* --- LOOP CLOCK (keep these; tune values, don't restructure) ---
   For VERIFYING the bloom, temporarily set GROW_TIME=2000, COLOR_TIME=1000,
   HOLD_TIME=30000, screenshot, then restore. See references/technique.md §9. */
const GROW_TIME    = 6000;       // assemble / 抽聚 (slower, more from-the-dark)
const COLOR_TIME   = 2600;       // ripen / 色彩蜕变 (ink→blue→green)
const BLOOM_DELAY  = 300;
const BLOOM_FADE_MS = 1300;
const HOLD_TIME    = 6200;       // hold after bloom, then loop
const WIND_SPEED   = 0.0011;     // gentle breathing/sway

let orb = [], stars = [];
let t0 = null, colorStart = null, bloomStart = null;

function pickFinal(i) {
  // ripe = mostly green, some white sparkle, a few icy-blue highlights
  const r = (i * 2654435761 % 100 + 100) % 100;          // deterministic-ish hash
  if (r < 70) return lerpColor(color(RIPE_GREEN_A), color(RIPE_GREEN_B), random());
  if (r < 88) return color(RIPE_WHITE);
  return color(RIPE_ICE);
}

// two-segment color ramp: 墨黑(c0) → 蓝(c1) → 绿(c2)
function lerp3(p, c0, c1, c2) {
  return p <= 0.5 ? lerpColor(c0, c1, p * 2) : lerpColor(c1, c2, (p - 0.5) * 2);
}

function buildScene() {
  // --- the letter-sphere (Fibonacci sphere so glyphs spread evenly) ---
  orb = [];
  for (let i = 0; i < ORB_COUNT; i++) {
    const y = 1 - (i / (ORB_COUNT - 1)) * 2;              // 1 .. -1
    const r = sqrt(max(0, 1 - y * y));
    const th = i * GOLDEN_ANGLE;
    orb.push({
      x0: cos(th) * r, y0: y, z0: sin(th) * r,            // unit-sphere coords
      sx: random(-1, 1) * ORB_R * 1.7,                    // cloud-scatter start
      sy: random(-1, 1) * ORB_R * 1.7,
      ch: ORB_CHARS.charAt(i % ORB_CHARS.length),
      reveal: random(0, 0.82),                            // when it joins the sphere
      c0: lerpColor(color(COL_INK_A),  color(COL_INK_B),  random()),  // 墨黑
      c1: lerpColor(color(COL_BLUE_A), color(COL_BLUE_B), random()),  // 蓝
      c2: pickFinal(i),                                                // 绿
      tw: random(TWO_PI)                                  // sparkle phase
    });
  }

  // --- faint starfield inside the porthole ---
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    const a = random(TWO_PI), rr = sqrt(random()) * DISC_R * 0.94;
    stars.push({ x: ORB_CX + cos(a) * rr, y: ORB_CY + sin(a) * rr,
                 s: random(1.2, 3.2), ph: random(TWO_PI), sp: random(0.001, 0.003) });
  }
}

function resetCycle() {
  t0 = millis();
  colorStart = null;
  bloomStart = null;
  buildScene();
}

function setup() {
  const c = createCanvas(CW, CH);
  c.parent('stage');
  textAlign(CENTER, CENTER);
  resetCycle();
}

function draw() {
  clear();                                         // 透明 -> 显示 CSS 渐变背景
  const now = millis();

  // 1. assemble progress 0~1
  const t = constrain((now - t0) / GROW_TIME, 0, 1);

  // 2. ripen progress
  let colorProg = 0;
  if (t >= 1) {
    if (colorStart === null) colorStart = now;
    colorProg = constrain((now - colorStart) / COLOR_TIME, 0, 1);
  }
  if (colorProg >= 1 && bloomStart === null) bloomStart = now + BLOOM_DELAY;

  // 3. bloom + loop
  let bloomA = 0, gFade = 1;
  if (bloomStart !== null && now >= bloomStart) {
    bloomA = constrain((now - bloomStart) / BLOOM_FADE_MS, 0, 1);
    const endAt = bloomStart + BLOOM_FADE_MS + HOLD_TIME;
    if (now > endAt) { resetCycle(); return; }
    gFade = constrain(map(endAt - now, 0, 520, 0, 1), 0, 1);  // soft fade-out before loop
  }

  drawCapsule(now, colorProg, bloomA, gFade);
  drawStarfield(now, t, gFade);
  drawOrb(now, t, colorProg, bloomA, gFade);
}

/* --- the dark porthole + glossy white housing + glowing rim --- */
function drawCapsule(now, colorProg, bloomA, gFade) {
  push();
  noStroke();
  // soft ambient halo (cool, intensifies as the orb blooms)
  const halo = 5 + bloomA * 9;
  const haloCol = lerpColor(color(COL_BLUE_A), color(RIPE_GREEN_A), colorProg);
  for (let i = 14; i >= 1; i--) {
    fill(red(haloCol), green(haloCol), blue(haloCol), halo * (i / 14) * 0.5 * gFade);
    ellipse(ORB_CX, ORB_CY, (DISC_R + 26) * 2 + i * 30);
  }
  // dark interior (the porthole) — keeps the bright glyphs legible
  fill(8, 9, 20, 255 * gFade);
  ellipse(ORB_CX, ORB_CY, DISC_R * 2);
  // glossy white housing ring
  noFill();
  stroke(255, 255, 255, 235 * gFade);
  strokeWeight(24);
  ellipse(ORB_CX, ORB_CY, DISC_R * 2 + 32);
  stroke(210, 212, 228, 150 * gFade);                 // subtle bevel
  strokeWeight(6);
  ellipse(ORB_CX, ORB_CY, DISC_R * 2 + 52);
  // inner accent rim — lights up green/purple as it ripens
  const rim = lerpColor(color(COL_BLUE_A), color(RIPE_GREEN_A), colorProg);
  stroke(red(rim), green(rim), blue(rim), (60 + bloomA * 150) * gFade);
  strokeWeight(3);
  ellipse(ORB_CX, ORB_CY, DISC_R * 2 - 14);
  pop();
}

function drawStarfield(now, t, gFade) {
  push();
  noStroke();
  for (const s of stars) {
    const a = (60 + 80 * (0.5 + 0.5 * sin(now * s.sp + s.ph))) * min(1, t * 1.4) * gFade;
    fill(200, 205, 255, a);
    ellipse(s.x, s.y, s.s);
  }
  pop();
}

/* --- the letter-sphere: cloud → sphere, dim → ripe, then sparkle --- */
function drawOrb(now, t, colorProg, bloomA, gFade) {
  const ang = now * ROT_SPEED;
  const ca = cos(ang), sa = sin(ang);
  const breathe = 1 + 0.02 * sin(now * WIND_SPEED);
  const Reff = ORB_R * breathe;

  push();
  textFont(ORB_FONT);
  textStyle(BOLD);
  textAlign(CENTER, CENTER);

  // sort back-to-front so near glyphs overlap far ones
  const order = [];
  for (let i = 0; i < orb.length; i++) {
    const g = orb[i];
    order.push({ g, rz: -g.x0 * sa + g.z0 * ca });
  }
  order.sort((a, b) => a.rz - b.rz);

  for (const o of order) {
    const g = o.g;
    // assemble: ease from scatter cloud into sphere position
    let ap = constrain((t - g.reveal) / 0.18, 0, 1);
    ap = ap * ap * (3 - 2 * ap);
    if (ap <= 0) continue;

    const rx = g.x0 * ca + g.z0 * sa;                  // rotate about Y
    const depth = o.rz;                                // -1 (back) .. 1 (front)
    const sphX = ORB_CX + rx * Reff;
    const sphY = ORB_CY + g.y0 * Reff;
    const px = lerp(g.sx + ORB_CX, sphX, ap);
    const py = lerp(g.sy + ORB_CY, sphY, ap);

    const depthA = map(depth, -1, 1, 0.32, 1);
    const size = ORB_BASE_SIZE * map(depth, -1, 1, 0.62, 1.22) * (0.35 + 0.65 * ap);
    const col = lerp3(colorProg, g.c0, g.c1, g.c2);       // 墨黑 → 蓝 → 绿

    // sparkle/glow on the lit front face once it blooms
    if (bloomA > 0 && depth > 0.15) {
      const tw = 0.5 + 0.5 * sin(now * 0.006 + g.tw);
      const glow = bloomA * depthA * tw * 72 * gFade;
      noStroke();
      fill(red(col), green(col), blue(col), glow);
      ellipse(px, py, size * 1.8);
    }

    const a = 255 * depthA * ap * gFade;
    fill(red(col), green(col), blue(col), a);
    textSize(size);
    text(g.ch, px, py);
  }
  pop();
}

/* ---- fit the 1080x1920 stage into the viewport ---- */
function fit() {
  const s = Math.min(window.innerWidth / CW, window.innerHeight / CH);
  document.getElementById('cover').style.transform =
    'translate(-50%,-50%) scale(' + s + ')';
}
window.addEventListener('resize', fit);
fit();
</script>
